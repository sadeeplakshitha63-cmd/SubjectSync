name: SubjectSync Content Engine

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes for 24/7 coverage
  workflow_dispatch:
    inputs:
      topic:
        description: 'Specific Topic to Sync'
        required: false

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install google-generativeai
        
      - name: Execution Optimization
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: python scripts/engine.py
        
      - name: Deploy Synchronized Resources
        run: |
          git config --global user.name "SubjectSync Engine"
          git config --global user.email "sync@subjectsync.edu"
          git add data/
          git commit -m "Auto-sync updated: Recent education resources" || echo "No changes to commit"
          git push
